# Example production WARP deployment, mirroring the Podman Quadlet setup in
# ../quadlet:
#   - warp-db        PostgreSQL
#   - warp-app       WARP application (uWSGI)
#   - warp-revproxy  Caddy reverse proxy
#
# The app and Caddy share the "warp-shared" tmpfs volume mounted at /run/warp:
# the app exposes its HTTP socket there and copies its static assets into it on
# start, and Caddy serves static directly while proxying everything else over
# the unix socket.
#
# The application image is built and published by the GitHub Actions workflow
# (.github/workflows/containers.yml) to the GitHub Container Registry:
#   https://github.com/sebo-b/warp/pkgs/container/warp
# For a self-contained demo with bundled PostgreSQL and sample data, use the
# debug image instead (containers/Dockerfile_debug).
#
# For the full list of configuration options (auth backends, reminders, etc.)
# see ../../CONFIGURATION.md and add the relevant WARP_* variables under
# warp-app.environment below.

services:
  warp-db:
    image: postgres
    environment:
      POSTGRES_DB: warp
      POSTGRES_PASSWORD_FILE: /run/secrets/warp_db_password
    secrets:
      - warp_db_password
    volumes:
      - warp-db-data:/var/lib/postgresql

  warp-app:
    image: ghcr.io/sebo-b/warp:latest  # pin a version in production, e.g. :v1.2.3
    depends_on:
      - warp-db
    environment:
      WARP_DATABASE_ADDRESS: "warp-db:5432"
      WARP_DATABASE_NAME: "warp"
      WARP_DATABASE_USER: "postgres"
      WARP_DATABASE_PASSWORD_FILE: /run/secrets/warp_db_password
      WARP_SECRET_KEY_FILE: /run/secrets/warp_secret_key
      # uWSGI endpoints, mirroring the Quadlet setup: disable the binary uWSGI
      # socket (empty value) so only the HTTP unix socket that Caddy proxies to
      # over the shared /run/warp volume remains. The HTTP socket already defaults
      # to /run/warp/uwsgi-http.sock in the app, so it is left commented below. To
      # run without the bundled Caddy, bind a TCP port instead, e.g.
      # WARPAPP_UWSGI_HTTP_SOCKET=0.0.0.0:8080.
      # WARPAPP_UWSGI_HTTP_SOCKET: /run/warp/uwsgi-http.sock
      WARPAPP_UWSGI_SOCKET: ""
      # Timezone used as the default for new plans and for reminders.
      # Sets DEFAULT_PLAN_TIMEZONE; also recognised by Python zoneinfo and
      # localtime() inside the container (musl needs tzdata, already in image).
      # Per-plan timezones override this after plans are created.
      # TZ: "Europe/Warsaw"
      # Seed sample zones/users on first start. Uncomment for a quick demo; leave
      # commented for production (the schema is created automatically and the
      # initial admin is set up on an empty database).
      # WARP_DATABASE_POST_INIT_SCRIPTS: '["sql/sample_data.sql"]'
    secrets:
      - warp_db_password
      - warp_secret_key
    volumes:
      - warp-shared:/run/warp

  warp-revproxy:
    image: caddy
    depends_on:
      - warp-app
    volumes:
      - ../res/Caddyfile:/etc/caddy/Caddyfile:ro
      - warp-shared:/run/warp
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "8080:80"

secrets:
  warp_db_password:
    file: ./secrets/db_password.txt
  warp_secret_key:
    file: ./secrets/secret_key.txt

volumes:
  warp-db-data:
  caddy_data:
  caddy_config:
  warp-shared:
    driver_opts:
      type: tmpfs
      device: tmpfs
