<!doctype html>
<html theme="{{ 'dark' if request.cookies.get('warp_theme') == 'dark' else 'light' }}">
<head>
    <title>WARP</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png" />

    <style>
        @font-face {
            font-family: 'Material Icons';
            font-style: normal;
            font-weight: 400;
            src: url('{{ url_for('static', filename='material_icons/MaterialIcons-Regular_v109.woff') }}') format('woff'),
                url('{{ url_for('static', filename='material_icons/MaterialIcons-Regular_v109.woff2') }}') format('woff2');
            }

        @font-face {
            font-family: 'Material Icons Outlined';
            font-style: normal;
            font-weight: 400;
            src: url('{{ url_for('static', filename='material_icons/MaterialIcons-Outlined_v81.woff') }}') format('woff'),
                url('{{ url_for('static', filename='material_icons/MaterialIcons-Outlined_v81.woff2') }}') format('woff2');
            }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='material_icons/material_icons.css') }}" />

    <script>
        window.warpGlobals = { URLs: {}, i18nUrl: "{{ url_for('static', filename=config['LANGUAGE_FILE']) }}" };
    </script>

    {% include 'headers/base.html' %}

    <!-- Single source of truth for colours: defines the M3 tokens Materialize 2.x
         reads (overriding its defaults — loaded AFTER the base bundle so the
         equal-specificity :root rules win by source order), plus the app's own
         --warp-* tokens. The active theme (light/dark) is set on <html> from the
         warp_theme cookie above, so the first paint already matches. -->
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}"  media="screen,projection"/>

    {% block header %}{% endblock %}
    {% block header_final %}{% endblock %}
</head>
<body>

    {% block overlays %}{% endblock %}

    <div class="warp-container">
    {% block nav %}{% endblock %}
    {% block content %}{% endblock %}
    </div>
</body>
</html>
