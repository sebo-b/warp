<svg xmlns="http://www.w3.org/2000/svg" width="552" height="48" viewBox="0 0 552 48">
  <!--
    Seat status cells (#cell-<name>). One per visual state; colours come from
    the :root warp-seat-* family theme vars (fg/bground), which cross an
    external use boundary, so the file is var-only (no currentColor). Shapes
    are defined once in defs below and reused by the cells.
  -->
  <defs>
    <!-- Base glyph paths, defined once, reused by the symbols. -->
    <path id="plus-path"  d="M19,13L13,13L13,19L11,19L11,13L5,13L5,11L11,11L11,5L13,5L13,11L19,11L19,13Z"/>
    <path id="arrow-path" d="M12,4L12,1L8,5L12,9L12,6C15.31,6 18,8.69 18,12C18,13.01 17.75,13.97 17.3,14.8L18.76,16.26C19.54,15.03 20,13.57 20,12C20,7.58 16.42,4 12,4ZM12,18C8.69,18 6,15.31 6,12C6,10.99 6.25,10.03 6.7,9.2L5.24,7.74C4.46,8.97 4,10.43 4,12C4,16.42 7.58,20 12,20L12,23L16,19L12,15L12,18Z"/>
    <!-- arrow-path split into its two arcs so the hollow rebook arrows can be
         stroked at different widths (upper edge thicker than lower). -->
    <path id="arrow-upper" d="M12,4L12,1L8,5L12,9L12,6C15.31,6 18,8.69 18,12C18,13.01 17.75,13.97 17.3,14.8L18.76,16.26C19.54,15.03 20,13.57 20,12C20,7.58 16.42,4 12,4Z"/>
    <path id="arrow-lower" d="M12,18C8.69,18 6,15.31 6,12C6,10.99 6.25,10.03 6.7,9.2L5.24,7.74C4.46,8.97 4,10.43 4,12C4,16.42 7.58,20 12,20L12,23L16,19L12,15L12,18Z"/>
    <path id="head-path"  d="M12,12C14.21,12 16,10.21 16,8C16,5.79 14.21,4 12,4C9.79,4 8,5.79 8,8C8,10.21 9.79,12 12,12ZM12,14C9.33,14 4,15.34 4,18L4,20L20,20L20,18C20,15.34 14.67,14 12,14Z"/>
    <!-- Rebook figure: same head circle as #head-path, but the body's bottom is
         the disc arc itself (r=10.5) so it meets the ring with no gap below and
         without needing a clip (clip-path isn't honoured by every sprite host). -->
    <path id="figure"     d="M12,12C14.21,12 16,10.21 16,8C16,5.79 14.21,4 12,4C9.79,4 8,5.79 8,8C8,10.21 9.79,12 12,12ZM2.29,16A10.5,10.5 0 0 0 21.71,16C18,13.8 14.8,13.4 12,13.4C9.2,13.4 6,13.8 2.29,16Z"/>
    <path id="tie-path"   d="M10,14L14,14L12,17.2L10,14ZM11.5,16.5L12.5,16.5L12.8,19L12,20L11.2,19L11.5,16.5Z"/>

    <!-- ===== Seat status cells. One g id=cell-NAME per visual state.
          Colours come from the :root theme vars (warp-seat-FAMILY-fg/-bg),
          which cross the external use boundary (proven by #disc). Light/dark flip
          via :root[theme=dark]. Shapes reused from the defs above; duplicated
          across colour families as needed. Added alongside the existing symbols
          and #disc, which the plan editor still uses. ===== -->

    <g id="cell-available">          <!-- plus, green -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-available-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-available-fg)" stroke-width="1.5"/>
      <use href="#plus-path" fill="var(--warp-seat-available-fg)"/>
    </g>

    <g id="cell-availableAssigned">  <!-- plus, blue (assigned to you) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-yours-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-yours-fg)" stroke-width="1.5"/>
      <use href="#plus-path" fill="var(--warp-seat-yours-fg)"/>
    </g>

    <g id="cell-edited">              <!-- head, green (editor: existing seat with unsaved changes) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-available-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-available-fg)" stroke-width="1.5"/>
      <use href="#head-path" fill="var(--warp-seat-available-fg)"/>
    </g>

    <g id="cell-rebook">             <!-- arrow, green -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-available-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-available-fg)" stroke-width="1.5"/>
      <use href="#arrow-path" fill="var(--warp-seat-available-fg)"/>
    </g>

    <g id="cell-rebookAssigned">      <!-- arrow, blue (assigned to you) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-yours-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-yours-fg)" stroke-width="1.5"/>
      <use href="#arrow-path" fill="var(--warp-seat-yours-fg)"/>
    </g>

    <g id="cell-yours">               <!-- head, blue (your exact booking) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-yours-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-yours-fg)" stroke-width="1.5"/>
      <use href="#head-path" fill="var(--warp-seat-yours-fg)"/>
    </g>

    <g id="cell-yoursChange">         <!-- head + sync arrows, blue (your booking, can change) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-yours-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-yours-fg)" stroke-width="1.5"/>
      <use href="#figure" fill="var(--warp-seat-yours-fg)"/>
      <use href="#arrow-upper" fill="var(--warp-seat-yours-bg)"/>
      <use href="#arrow-upper" fill="var(--warp-seat-yours-fg)" fill-opacity="0.2"/>
      <use href="#arrow-upper" fill="none" stroke="var(--warp-seat-yours-fg)" stroke-width="0.9" stroke-linejoin="round"/>
      <use href="#arrow-lower" fill="var(--warp-seat-yours-bg)"/>
      <use href="#arrow-lower" fill="var(--warp-seat-yours-fg)" fill-opacity="0.2"/>
      <use href="#arrow-lower" fill="none" stroke="var(--warp-seat-yours-fg)" stroke-width="0.5" stroke-linejoin="round"/>
    </g>

    <g id="cell-taken">               <!-- head, grey (booked by other / your unchangeable / view-only-taken) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-unavailable-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-unavailable-fg)" stroke-width="1.5"/>
      <use href="#head-path" fill="var(--warp-seat-unavailable-fg)"/>
    </g>

    <g id="cell-assigned">            <!-- head + tie knockout, grey (assigned to others) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-unavailable-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-unavailable-fg)" stroke-width="1.5"/>
      <use href="#head-path" fill="var(--warp-seat-unavailable-fg)"/>
      <use href="#tie-path" fill="var(--warp-seat-unavailable-bg)"/>
    </g>

    <g id="cell-unavailable">         <!-- no-symbol (plus rotated 45deg), grey (view-only free / disabled / no dates) -->
      <circle cx="12" cy="12" r="10.5" fill="var(--warp-seat-unavailable-bg)"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--warp-seat-unavailable-fg)" stroke-width="1.5"/>
      <use href="#plus-path" fill="var(--warp-seat-unavailable-fg)" transform="rotate(45 12 12)"/>
    </g>
  </defs>

  <!-- Cell preview strip (colours resolve from the :root warp-seat-* vars
       referenced by each cell). -->
  <use href="#cell-available"         x="0"   y="0" width="48" height="48"/>
  <use href="#cell-availableAssigned" x="56"  y="0" width="48" height="48"/>
  <use href="#cell-rebook"            x="112" y="0" width="48" height="48"/>
  <use href="#cell-rebookAssigned"    x="168" y="0" width="48" height="48"/>
  <use href="#cell-yours"             x="224" y="0" width="48" height="48"/>
  <use href="#cell-yoursChange"       x="280" y="0" width="48" height="48"/>
  <use href="#cell-taken"             x="336" y="0" width="48" height="48"/>
  <use href="#cell-assigned"         x="392" y="0" width="48" height="48"/>
  <use href="#cell-unavailable"       x="448" y="0" width="48" height="48"/>
  <use href="#cell-edited"           x="504" y="0" width="48" height="48"/>
</svg>
