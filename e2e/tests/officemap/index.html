<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OfficeMap isolated test</title>
<link rel="stylesheet" href="/static/theme.css">
<!-- Test harness styles: a sized viewport and dark-mode toggle. -->
<style>
  html,body{margin:0;height:100%;font:14px/1.4 sans-serif}
  #map{position:absolute;left:0;top:40px;width:100vw;height:calc(100vh - 40px)}
  #bar{position:fixed;top:0;left:0;right:0;height:40px;display:flex;align-items:center;gap:12px;padding:0 12px;background:#eee;z-index:20;border-bottom:1px solid #ccc}
  #bar button{padding:2px 8px}
  #status{margin-left:auto;color:#555;font-family:monospace;font-size:12px}
  #log{position:fixed;bottom:0;left:0;right:0;max-height:120px;overflow:auto;background:#fafafa;border-top:1px solid #ccc;font:11px/1.3 monospace;z-index:20;display:none}
</style>
</head>
<body>
<div id="bar">
  <button id="mode-follow">mode: follow</button>
  <button id="mode-flat">mode: flat</button>
  <button id="mode-clamp">mode: clamp</button>
  <button id="toggle-dark">dark</button>
  <button id="clear">clear seats</button>
  <button id="reseed">reseed seats</button>
  <span id="status"></span>
</div>
<div id="map"></div>
<pre id="log"></pre>

<script type="importmap">
{ "imports": { "@panzoom/panzoom": "/panzoom/panzoom.es.js" } }
</script>
<script type="module">
import { OfficeMap } from '/js/views/modules/officeMap.js';

const SPRITE_URL = '/static/images/seat_icons.svg';
const MAP = '/maps/zone1a.png';

// A representative spread of cells + a couple with labels/hints.
function seed() {
  const cells = ['available','availableAssigned','rebook','rebookAssigned','yours','yoursChange','taken','assigned','unavailable','bogus'];
  const seats = [];
  let i = 0;
  for (let y = 60; y < 600; y += 70) {
    for (let x = 60; x < 800; x += 70) {
      const id = 's' + i;
      const sprite = cells[i % cells.length];
      const labelled = (i % 3 === 0);
      seats.push({
        id, x, y, sprite,
        labelTitle: labelled ? `Seat ${id}` : null,
        labelBody: labelled ? document.createTextNode(`state: ${sprite}`) : null,
        hintTitle: `Hint for ${id}`,
        hintBody: document.createTextNode(`sprite=${sprite}, pos=(${x},${y})`),
      });
      i++;
    }
  }
  return seats;
}

const target = document.getElementById('map');
const om = new OfficeMap(target, {
  mapImage: MAP,
  sprite: { url: SPRITE_URL, cellWidth: 48, cellHeight: 48 },
  zoom: { initial: 'fit', min: null, max: 4 },   // null min => fit
  spriteZoom: { min: 0.5, max: 2 },              // clamp range exercised by mode:clamp
  filter: null,
});

om.addEventListener('click', (e) => { window.__lastClick = e.detail.id; window.__clickCount = (window.__clickCount||0)+1; log(`click id=${e.detail.id}`); });

// Test hooks.
window.__scale = () => om._pz ? om._pz.getScale() : null;
window.__pan   = () => om._pz ? om._pz.getPan() : null;
window.__worldRect = () => om.world.getBoundingClientRect();
window.__bgRect    = () => om.bg.getBoundingClientRect();
window.__rootRect  = () => om.root.getBoundingClientRect();
window.__seatRect  = (id) => { const el = document.getElementById('sprite-'+id); return el && el.getBoundingClientRect(); };
window.__lastClick = null; window.__clickCount = 0;
window.__resetClicks = () => { window.__lastClick=null; window.__clickCount=0; };

function setMode(m){ om.setSpriteMode(m); document.getElementById('status').textContent = 'mode=' + m; }
document.getElementById('mode-follow').onclick = () => setMode('follow');
document.getElementById('mode-flat').onclick   = () => setMode('flat');
document.getElementById('mode-clamp').onclick  = () => setMode('clamp');

document.getElementById('clear').onclick  = () => om.createSeats([]);
document.getElementById('reseed').onclick = () => om.createSeats(seed());

const darkBtn = document.getElementById('toggle-dark');
darkBtn.onclick = () => {
  const dark = document.documentElement.getAttribute('theme') === 'dark';
  document.documentElement.setAttribute('theme', dark ? 'light' : 'dark');
  darkBtn.textContent = dark ? 'dark' : 'light';
};

const logEl = document.getElementById('log');
function log(msg){ console.log(msg); logEl.style.display='block'; logEl.textContent += msg + '\n'; logEl.scrollTop = 1e9; }

// Expose for tests.
window.__om = om;
window.__seed = seed;
om.createSeats(seed());
</script>
</body>
</html>
