<dialog id="edit_modal" class="modal warp-form-modal warp-fields">
    <div class="modal-content">
        <div class="row">
            <div class="input-field col s12 m4">
                <input id="login" type="text" required>
                <label for="login" class="TR">Login</label>
            </div>
            <div class="input-field col s12 m8">
                <select id="account_type_select">
                </select>
                <label class="TR">Account type</label>
            </div>

            <div class="input-field col s12">
                <input id="name" type="text" required>
                <label for="name" class="TR">User name</label>
            </div>
            <div class="input-field col s12 m6">
                <input id="password" type="password">
                <label for="password" class="TR">Password</label>
                <i class="material-icons show_password_btn"></i>
            </div>
            <div class="input-field col s12 m6">
                <input id="password2" type="password">
                <label for="password2" class="TR">Retype password</label>
                <i class="material-icons show_password_btn"></i>
            </div>

            <div class="input-field col s12" id="add_to_group_container">
                <label for="add_to_group" class="add_to_group_label TR">Groups</label>
                <!-- NB: no `chips` class here on purpose — GroupChips adds it itself at
                     runtime so Materialize's own `.chips` auto-scan never touches it. -->
                <div class="chips-autocomplete" id="add_to_group"></div>
            </div>

        </div>
        <div class="row" style="display: none" id="error_div">
            <div class="col s12" style="color: red" id="error_message">
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="waves-effect waves-light btn-flat left TR" id="generate_password_btn">btn.Generate password</button>
        <button type="button" class="modal-close waves-effect waves-light btn warp-btn-danger TR" id="edit_modal_delete_btn">btn.Delete</button>
        <button type="button" class="waves-effect waves-light btn TR" id="edit_modal_save_btn">btn.Save</button>
        <button type="button" class="modal-close waves-effect waves-light btn-flat TR">btn.Cancel</button>
    </div>
</dialog>

<div class="fixed-action-btn">
    <button type="button" class="btn-floating btn-large waves-effect waves-light warp-fab-add" id="add_user_btn">
        <i class="material-icons-outlined">person_add_alt</i>
    </button>
</div>

<div class="container">
    <div id="usersTable"></div>
</div>
