{% extends 'base_logged.html' %}

{% block header %}
    {{ super() }}

<script>
    window.warpGlobals.pid = {{ pid }};
    window.warpGlobals.returnURL = "{{ returnURL }}";
    window.warpGlobals.URLs['plansModifyXHR'] = "{{ url_for('xhr.plans.modify') }}";
    window.warpGlobals.URLs['plansGetSeats'] = "{{ url_for('xhr.plans.getSeats', pid=pid) }}";
    window.warpGlobals.URLs['plansZonesForPlan'] = "{{ url_for('xhr.plans.zonesForPlan') }}?pid={{ pid }}";
    window.warpGlobals.URLs['plansAllZones'] = "{{ url_for('xhr.plans.allZones') }}";
    window.warpGlobals.URLs['seatSprite'] = "{{ url_for('static',filename='images/seat_icons.svg') }}";
</script>

{% endblock %}

{% block content %}
    {{ super() }}

  <div class="zone_modify_container">

    <div class="zone_modify_map" id="zone_map_container">
      <img id="zone_map" src="{{ url_for('view.planImage', pid=pid) }}" draggable="false">
    </div>

    <div class="zone_modify_sidepanel warp-fields">
      <input type="file" accept="image/jpeg,image/png" id="mapUploadInput" style="display:none">
      <div class="zone_modify_sidepanel_top">
          <a class="waves-effect waves-light btn TR" id="chooseImgBtn">btn.Upload map</a>
      </div>
      <div class="zone_modify_sidepanel_top switch-container">
          <div class="switch">
            <label>
              <span class="TR">btn.Edit</span>
              <input type="checkbox" id="modeSwitch">
              <span class="lever"></span>
              <span class="TR">btn.Add seats</span>
            </label>
          </div>
      </div>

      <div id="add_seat_zone_selector" style="display: none; margin-top: 12px;">
        <div class="input-field">
          <select id="add_seat_zone">
          </select>
          <label class="TR">seatEdit.Zone for new seats</label>
        </div>
      </div>

      <div id="add_seat_zone_error" style="display: none; color: red; margin-top: 8px; font-size: 0.9em;">
        <span class="TR">You must create a zone before adding seats.</span>
      </div>

      <div>
        <div id="seat_edit_panel" style="visibility: hidden">
          <div class="input-field">
            <input id="seat_name" type="text">
            <label for="seat_name" class="TR">seatEdit.Seat name</label>
          </div>
          <div class="input-field">
            <input id="seat_x" type="number" min="0">
            <label for="seat_x" class="TR">seatEdit.X</label>
          </div>
          <div class="input-field">
            <input id="seat_y" type="number" min="0">
            <label for="seat_y" class="TR">seatEdit.Y</label>
          </div>
          <div class="input-field">
            <select id="seat_zone">
            </select>
            <label class="TR">seatEdit.Zone</label>
          </div>
          <div class="input-field center-align">
            <a class="waves-effect waves-light btn TR" id="seat_delete_btn">btn.Delete</a>
          </div>
        </div>

      </div>

      <div class="zone_modify_sidepanel_bottom">
        <a class="waves-effect waves-light btn btn-flat TR" id="cancelBtn">btn.Cancel</a>
        <a class="waves-effect waves-light btn disabled TR" id="saveBtn">btn.Save</a>
      </div>

    </div>

  </div>

{% endblock %}
