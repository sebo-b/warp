services:
  warp-demo-db:
    image: postgres
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/warp_db_password
      POSTGRES_DB: postgres
    secrets:
      - warp_db_password
  warp-demo-wsgi:
    build:
      context: ../..
      dockerfile: containers/Dockerfile
    depends_on:
    - warp-demo-db
    environment:
      WARP_DATABASE_ADDRESS: "warp-demo-db:5432"
      WARP_DATABASE_NAME: "postgres"
      WARP_DATABASE_USER: "postgres"
      WARP_DATABASE_PASSWORD_FILE: /run/secrets/warp_db_password
      WARP_SECRET_KEY_FILE: /run/secrets/warp_secret_key
      WARP_DATABASE_POST_INIT_SCRIPTS: '["sql/sample_data.sql"]'
      WARP_LANGUAGE_FILE: 'i18n/en.js'
    secrets:
      - warp_db_password
      - warp_secret_key
  warp-demo-nginx:
    image: nginx
    depends_on:
    - warp-demo-wsgi
    volumes:
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

secrets:
  warp_db_password:
    file: ./secrets/db_password.txt
  warp_secret_key:
    file: ./secrets/secret_key.txt
