{% extends 'base.html' %}

{% block header %}
    {{ super() }}

    <style>
        html, body {
            height: 100%;
            width: 100%;
        }
        .action-outer {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 16px;
        }
        .action-card {
            width: 100%;
            max-width: 480px;
        }
        .confirm-links {
            margin-top: 24px;
        }
    </style>
{% endblock %}

{% block content %}
    {{ super() }}

    <nav>
        <div class="nav-wrapper">
            <div class="center"><svg class="logo" viewBox="0 0 390 85" role="img" aria-label="WARP"><use href="{{ url_for('static', filename='images/logo.svg') }}#wordmark"/></svg></div>
        </div>
    </nav>

    <div class="action-outer">
        <div class="card action-card">
            <div class="card-content">
                <span class="card-title">{{ title }}</span>
                {% if details %}
                <p>{{ details }}</p>
                {% endif %}
                {% if confirm_url %}
                <div class="confirm-links">
                    <a href="{{ confirm_url }}" class="waves-effect waves-light btn warp-btn-primary">{{ confirm_label }}</a>
                    <a href="{{ cancel_url }}" class="waves-effect btn-flat">{{ cancel_label }}</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
{% endblock %}
