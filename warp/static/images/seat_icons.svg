<svg xmlns="http://www.w3.org/2000/svg" width="328" height="48" viewBox="0 0 328 48">
  <!--
    Seat status icons. Shape-only: exactly one symbol per shape.
    Colour comes entirely from CSS `color` (currentColor) via the
    seat-icon / seat-icon (green|blue|grey) classes; there are no
    per-colour copies. Style: light tinted disc (currentColor @ 0.15)
    + thin ring (currentColor @ 0.35) + solid coloured glyph.
  -->
  <defs>
    <!-- Base glyph paths, defined once, reused by the symbols. -->
    <path id="plus-path"  d="M19,13L13,13L13,19L11,19L11,13L5,13L5,11L11,11L11,5L13,5L13,11L19,11L19,13Z"/>
    <path id="arrow-path" d="M12,4L12,1L8,5L12,9L12,6C15.31,6 18,8.69 18,12C18,13.01 17.75,13.97 17.3,14.8L18.76,16.26C19.54,15.03 20,13.57 20,12C20,7.58 16.42,4 12,4ZM12,18C8.69,18 6,15.31 6,12C6,10.99 6.25,10.03 6.7,9.2L5.24,7.74C4.46,8.97 4,10.43 4,12C4,16.42 7.58,20 12,20L12,23L16,19L12,15L12,18Z"/>
    <path id="head-path"  d="M12,12C14.21,12 16,10.21 16,8C16,5.79 14.21,4 12,4C9.79,4 8,5.79 8,8C8,10.21 9.79,12 12,12ZM12,14C9.33,14 4,15.34 4,18L4,20L20,20L20,18C20,15.34 14.67,14 12,14Z"/>
    <path id="no-path"    d="M12,2C6.48,2 2,6.48 2,12C2,17.52 6.48,22 12,22C17.52,22 22,17.52 22,12C22,6.48 17.52,2 12,2ZM12,20C7.58,20 4,16.42 4,12C4,10.15 4.63,8.46 5.69,7.1L16.9,18.31C15.46,19.37 13.85,20 12,20ZM18.31,16.9L7.1,5.69C8.54,4.63 10.15,4 12,4C16.42,4 20,7.58 20,12C20,13.85 19.37,15.54 18.31,16.9Z"/>
    <path id="tie-path"   d="M10,14L14,14L12,17.2L10,14ZM11.5,16.5L12.5,16.5L12.8,19L12,20L11.2,19L11.5,16.5Z"/>

    <!-- Disc reused by every symbol. Opaque light fill = white base + a
         currentColor tint on top (a lighter shade of the glyph colour, not
         transparent). Ring is full currentColor, as dark as the glyph.
         The white base is the light-theme background; parameterise it when a
         dark theme lands. -->
    <g id="disc">
      <circle cx="12" cy="12" r="10.5" fill="#ffffff"/>
      <circle cx="12" cy="12" r="10.5" fill="currentColor" fill-opacity="0.2"/>
      <circle cx="12" cy="12" r="10.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </g>

    <!-- Circular arrows for icon-head-arrow (flattened from the source artwork). -->
    <path id="head-arrow-upper" d="M161.158,40.763L158.042,39.522L160.904,37.774L161.158,40.763Z" fill="currentColor"/>
    <path id="head-arrow-lower" d="M158.902,53.261L162.023,54.489L159.168,56.249L158.902,53.261Z" fill="currentColor"/>
    <path id="head-arc-upper" d="M167.012,50.512C169.592,45.333 166.548,39.497 160.433,39.319" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="1.5"/>
    <path id="head-arc-lower" d="M152.916,43.78C150.335,48.96 153.49,54.576 159.632,54.702" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="1.5"/>

    <!-- Symbols referenced by the app (one per shape). -->
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <use href="#disc"/>
      <use href="#plus-path" fill="currentColor"/>
    </symbol>

    <symbol id="icon-arrow" viewBox="0 0 24 24">
      <use href="#disc"/>
      <use href="#arrow-path" fill="currentColor"/>
    </symbol>

    <symbol id="icon-head" viewBox="0 0 24 24">
      <use href="#disc"/>
      <use href="#head-path" fill="currentColor"/>
    </symbol>

    <symbol id="icon-head-arrow" viewBox="0 0 24 24">
      <use href="#disc"/>
      <use href="#head-path" transform="translate(4.137428, 4.137428) scale(0.655214)" fill="currentColor"/>
      <g transform="translate(-148, -35)">
        <use href="#head-arrow-upper"/>
        <use href="#head-arc-upper"/>
        <use href="#head-arrow-lower"/>
        <use href="#head-arc-lower"/>
      </g>
    </symbol>

    <symbol id="icon-no" viewBox="0 0 24 24">
      <use href="#disc"/>
      <use href="#no-path" fill="currentColor"/>
    </symbol>

    <symbol id="icon-assigned" viewBox="0 0 24 24">
      <use href="#disc"/>
      <use href="#head-path" fill="currentColor"/>
      <!-- tie knocked out so it reads against the solid head.
           Literal white (not a CSS var): custom properties don't cross into
           an external <use>, and white reads on every disc colour / theme. -->
      <use href="#tie-path" fill="#ffffff"/>
    </symbol>
  </defs>

  <!-- Preview only (the app references the symbols above): one icon per shape. -->
  <use href="#icon-plus"       x="0"   y="0" width="48" height="48" color="#2e7d32"/>
  <use href="#icon-arrow"      x="56"  y="0" width="48" height="48" color="#2e7d32"/>
  <use href="#icon-head"       x="112" y="0" width="48" height="48" color="#3949ab"/>
  <use href="#icon-head-arrow" x="168" y="0" width="48" height="48" color="#3949ab"/>
  <use href="#icon-no"         x="224" y="0" width="48" height="48" color="#9e9e9e"/>
  <use href="#icon-assigned"   x="280" y="0" width="48" height="48" color="#9e9e9e"/>
</svg>
