<dialog id="edit_modal" class="modal warp-form-modal warp-fields">
    <div class="modal-content">
        <div class="row">
            <div class="input-field col s12">
                <input id="zone_name" type="text" required>
                <label for="zone_name" class="TR">Zone name</label>
            </div>
        </div>
        <div class="row">
            <div class="input-field col s12">
                <select id="zone_type">
                    <option value="10" class="TR">zoneType.Disabled</option>
                    <option value="20" class="TR">zoneType.Enabled</option>
                    <option value="30" class="TR">zoneType.PublicView</option>
                    <option value="40" class="TR">zoneType.PublicBook</option>
                </select>
                <label class="TR">Zone type</label>
            </div>
        </div>
        <div class="row">
            <div class="input-field col s12">
                <input id="zone_group" type="text" class="autocomplete" placeholder="—" autocomplete="off">
                <label for="zone_group" class="TR active">Zone group (optional)</label>
                <span id="zone_group_helper" class="helper-text grey-text" style="display:none;"></span>
            </div>
        </div>
        <div class="row" style="display: none" id="error_div">
            <div class="col s12" style="color: red" id="error_message">
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="waves-effect waves-light btn warp-btn-danger TR" id="edit_modal_delete_btn">btn.Delete</button>
        <button type="button" class="waves-effect waves-light btn TR" id="edit_modal_save_btn">btn.Save</button>
        <button type="button" class="modal-close waves-effect waves-light btn-flat TR" id="edit_modal_cancel_btn">btn.Cancel</button>
    </div>
</dialog>

<div class="fixed-action-btn">
    <button type="button" class="btn-floating btn-large waves-effect waves-light warp-fab-add" id="add_zone_btn">
        <i class="material-icons-outlined">add</i>
    </button>
</div>

<div class="container">
    <div id="zonesTable"></div>
</div>
