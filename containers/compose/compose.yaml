services:
  warp-demo-db:
    image: postgres
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/warp_db_password
      POSTGRES_DB: postgres
    secrets:
      - warp_db_password
  warp-demo-wsgi:
    build:
      context: ../..
      dockerfile: containers/Dockerfile
    depends_on:
    - warp-demo-db
    environment:
      WARP_DATABASE_ADDRESS: "warp-demo-db:5432"
      WARP_DATABASE_NAME: "postgres"
      WARP_DATABASE_USER: "postgres"
      WARP_DATABASE_PASSWORD_FILE: /run/secrets/warp_db_password
      WARP_SECRET_KEY_FILE: /run/secrets/warp_secret_key
      WARP_DATABASE_POST_INIT_SCRIPTS: '["sql/sample_data.sql"]'
      WARP_LANGUAGE_FILE: 'i18n/en.js'
      # OpenID Connect (OIDC) — uncomment to enable, see CONFIGURATION.md
      # WARP_AUTH_OIDC: 'true'
      # WARP_OIDC_DISCOVERY_URL: 'https://idp.example.org/realms/warp/.well-known/openid-configuration'
      # WARP_OIDC_CLIENT_ID: 'warp'
      # WARP_OIDC_CLIENT_SECRET_FILE: /run/secrets/warp_oidc_client_secret
      # WARP_OIDC_GROUP_MAP: '[ ["warp-allowed", null], [null, "Everyone"] ]'
      # Native SAML 2.0 — uncomment to enable, see CONFIGURATION.md
      # WARP_AUTH_SAML: 'true'
      # WARP_SAML_SP_ENTITY_ID: 'https://warp.example.org/saml/metadata'
      # WARP_SAML_IDP_METADATA_URL: 'https://idp.example.org/realms/warp/protocol/saml/descriptor'
      # # Or a downloadable IdP metadata file (e.g. Okta):
      # WARP_SAML_IDP_METADATA_FILE: /etc/warp/idp-metadata.xml
      # WARP_SAML_SP_PRIVATE_KEY_FILE: /run/secrets/warp_saml_sp_private_key
      # WARP_SAML_GROUP_MAP: '[ ["warp-allowed", null], [null, "Everyone"] ]'
      # # Optional custom SP endpoint base path (default /saml):
      # WARP_SAML_ENDPOINT_PATH: /saml
      # # Required for the IdP→ACS cross-site POST (SameSite=None needs Secure/HTTPS):
      # WARP_SESSION_COOKIE_SAMESITE: 'None'
      # WARP_SESSION_COOKIE_SECURE: 'true'
    secrets:
      - warp_db_password
      - warp_secret_key
  warp-demo-nginx:
    image: nginx
    depends_on:
    - warp-demo-wsgi
    volumes:
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

secrets:
  warp_db_password:
    file: ./secrets/db_password.txt
  warp_secret_key:
    file: ./secrets/secret_key.txt
  # warp_oidc_client_secret:
  #   file: ./secrets/oidc_client_secret.txt
  # warp_saml_sp_private_key:
  #   file: ./secrets/saml_sp_private_key.txt
