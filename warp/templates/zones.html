{% extends 'base_logged.html' %}

{% block header %}
    {{ super() }}

<script>
    window.warpGlobals.URLs['zonesList'] = "{{ url_for('xhr.zones.list') }}";
    window.warpGlobals.URLs['zonesDelete'] = "{{ url_for('xhr.zones.delete') }}";
    window.warpGlobals.URLs['zonesAddOrEdit'] = "{{ url_for('xhr.zones.addOrEdit') }}";
    window.warpGlobals.URLs['zonesGroups'] = "{{ url_for('xhr.zones.groups') }}";
    window.warpGlobals.URLs['zoneAssign'] = "{{ url_for('view.zoneAssign', zid='__ZID__', return=request.url) }}";
    window.warpGlobals.ungroupedFilterKey = "{{ ungroupedFilterKey }}";
</script>

{% endblock %}

{% block overlays %}
    {{ super() }}

<dialog id="edit_modal" class="modal warp-form-modal">
    <div class="modal-content">
        <div class="row">
            <div class="input-field col s12">
                <input id="zone_name" type="text" required>
                <label for="zone_name" class="TR">Zone name</label>
            </div>
        </div>
        <div class="row">
            <div class="input-field col s12">
                <select id="zone_type">
                    <option value="10" class="TR">zoneType.Disabled</option>
                    <option value="20" class="TR">zoneType.Enabled</option>
                    <option value="30" class="TR">zoneType.PublicView</option>
                    <option value="40" class="TR">zoneType.PublicBook</option>
                </select>
                <label class="TR">Zone type</label>
            </div>
        </div>
        <div class="row">
            <div class="input-field col s12">
                <input id="zone_group" type="text" class="autocomplete" placeholder="—" autocomplete="off">
                <label for="zone_group" class="TR active">Zone group (optional)</label>
                <span id="zone_group_helper" class="helper-text grey-text" style="display:none;"></span>
            </div>
        </div>
        <div class="row" style="display: none" id="error_div">
            <div class="col s12" style="color: red" id="error_message">
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <a href="#!" class="waves-effect waves-light btn warp-btn-danger TR" id="edit_modal_delete_btn">btn.Delete</a>
        <a href="#!" class="waves-effect waves-light btn TR" id="edit_modal_save_btn">btn.Save</a>
        <a href="#!" class="modal-close waves-effect waves-light btn-flat TR" id="edit_modal_cancel_btn">btn.Cancel</a>
    </div>
</dialog>

<div class="fixed-action-btn">
    <a class="btn-floating btn-large waves-effect waves-light warp-fab-add" id="add_zone_btn">
        <i class="material-icons-outlined">add</i>
    </a>
</div>


{% endblock %}

{% block content %}
    {{ super() }}

    <div class="container">
        <div id="zonesTable"></div>
    </div>

{% endblock %}
